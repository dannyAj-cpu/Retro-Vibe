<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Top Hits - RetroVibe FM</title>

    <!-- Fuentes retro -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at top, #2b1055, #000);
            color: #fff;
        }

        header {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            color: white;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 20px #ff00cc;
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
            font-family: 'Press Start 2P', cursive;
            text-shadow: 0 0 10px #ff00cc, 0 0 20px #00ffff;
        }

        header p {
            color: #00ffff;
            margin-top: 10px;
        }

        /* BOTÓN REGRESAR */
        .volver {
            display: block;
            margin: 20px auto;
            padding: 12px 20px;
            background: transparent;
            border: 2px solid #00ffff;
            color: #00ffff;
            font-family: 'Orbitron';
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            width: 200px;
            transition: 0.3s;
        }

        .volver:hover {
            background: #ff00cc;
            color: #fff;
            box-shadow: 0 0 15px #ff00cc;
        }

        ol {
            width: 65%;
            margin: 20px auto;
            background: rgba(0,0,0,0.6);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 20px #ff00cc;
        }

        li {
            margin: 20px 0;
            font-size: 1.2em;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        li:hover {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            transform: translateX(10px);
        }

    </style>
</head>

<body>

<header>
    <h1>🎶 Top Hits</h1>
    <p>Las canciones más escuchadas en RetroVibe FM</p>
</header>

<!-- 🔥 CORREGIDO -->
<a href="index.html">
    <button class="volver">⬅ Volver al Inicio</button>
</a>

<ol>
    <li>José José - El Triste</li>
    <li>Mon Laferte - Tu Falta de Querer</li>
    <li>Juan Gabriel - Querida</li>
    <li>Shakira - Antología</li>
    <li>Luis Miguel - La Incondicional</li>
</ol>

</body>
</html>
